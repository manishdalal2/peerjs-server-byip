<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Peer Network</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='25' cy='25' r='15' fill='%235B8EF0'/%3E%3Ccircle cx='75' cy='25' r='15' fill='%235B8EF0'/%3E%3Ccircle cx='50' cy='75' r='15' fill='%235B8EF0'/%3E%3Cpath d='M 25 25 L 50 75 M 75 25 L 50 75' stroke='%23667eea' stroke-width='4' fill='none'/%3E%3C/svg%3E">
    <link rel="stylesheet" href="/client/styles.css">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>

<!-- ── Header ── -->
<header>
    <h1>🌐 Local Peer Network</h1>
    <div class="header-right">
        <div class="my-id-badge">ID: <span id="headerPeerId">connecting…</span></div>
        <div id="serverBadge" class="server-badge disconnected">Disconnected</div>
        <a href="https://www.buymeacoffee.com/mdalal" target="_blank" rel="noopener noreferrer"><img src="https://img.buymeacoffee.com/button-api/?text=Buy me a coffee&emoji=&slug=mdalal&button_colour=BD5FFF&font_colour=ffffff&font_family=Cookie&outline_colour=000000&coffee_colour=FFDD00" alt="Buy me a coffee" style="height:36px;border-radius:6px;" /></a>
    </div>
</header>

<!-- Mobile menu toggle -->
<button class="mobile-menu-btn" id="mobileMenuBtn" title="Show Peers">👥</button>
<div class="mobile-overlay" id="mobileOverlay"></div>

<div class="main">

    <!-- ── Sidebar ── -->
    <div class="sidebar">

        <div class="my-info">
            <div class="section-label">My Info</div>
            <div class="my-info-alias" id="myAliasEl">—</div>
            <div class="my-info-id"   id="myPeerIdFull">—</div>
            <div class="profile-form">
                <input class="profile-input" id="displayNameInput" maxlength="50" placeholder="Set your name (optional)" />
                <div class="profile-row">
                    <input class="profile-input" id="pinInput" maxlength="50" placeholder="PIN (optional)" />
                    <button class="profile-save" id="saveProfileBtn">Save</button>
                </div>
            </div>
        </div>

        <div class="peers-header">
            <span class="section-label">Network Peers</span>
            <button class="refresh-btn" id="refreshBtn">↻ Refresh</button>
        </div>

        <div class="peer-list" id="peerList">
            <div class="no-peers">Discovering peers…</div>
        </div>

        <div class="manual-connect">
            <div class="section-label">Connect by ID</div>
            <div class="manual-row">
                <input class="manual-input" id="manualId" placeholder="Paste peer ID…" />
                <button class="go-btn" id="manualBtn">Go</button>
            </div>
        </div>

    </div>

    <!-- ── Chat panel ── -->
    <div class="panel">

        <div class="conn-bar">
            <div class="conn-dot" id="connDot"></div>
            <span class="conn-label">Connected to:</span>
            <span class="conn-name" id="connName">No one — select a peer</span>
        </div>

        <div class="panel-body">

            <div class="overlay" id="overlay">
                <div class="overlay-icon">👈</div>
                <div class="overlay-text">Select a peer from the list to start</div>
            </div>

            <div class="chat-msgs" id="chatMsgs">
                <div class="empty-chat" id="emptyChat">No messages yet. Say hello!</div>
            </div>

            <div class="input-bar">
                <!-- Staged file preview (hidden until file selected) -->
                <div class="staged-file" id="stagedWrap" style="display:none">
                    <div class="staged-icon" id="stagedIcon">📄</div>
                    <div class="staged-info">
                        <div class="staged-name" id="stagedName"></div>
                        <div class="staged-size" id="stagedSize"></div>
                    </div>
                    <button class="staged-clear" id="clearStaged" title="Remove">✕</button>
                </div>

                <div class="input-row">
                    <input type="file" id="fileInput" style="display:none" />
                    <button class="attach-btn" id="attachBtn" title="Attach file">📎</button>
                    <input class="chat-input" id="msgInput" placeholder="Type a message…" />
                    <button class="send-btn" id="sendBtn">Send</button>
                </div>
            </div>

        </div>
    </div>
</div>

<div class="statusbar" id="statusBar">Initialising…</div>

<!-- Notification sound -->
<audio id="notificationSound" preload="auto">
    <source src="/client/ring.mp3" type="audio/mpeg">
</audio>

<script src="/client/app.js"></script>
</body>
</html>
